version: "3.9"

services:

  # ── Infraestructura local ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: ${AWS_REGION}
    volumes:
      - localstack_data:/var/lib/localstack

  # ── API Gateway local (equivalente al AWS API Gateway en producción) ─────────

  gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/swagger.html:/usr/share/nginx/html/swagger.html:ro
    depends_on:
      - usuarios
      - busquedas
      - hoteles
      - reservas
      - pagos
      - notificaciones

  # ── Microservicios ───────────────────────────────────────────────────────────

  usuarios:
    build:
      context: ./src/backend
      dockerfile: usuarios/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8002:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SERVICE_NAME: usuarios
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/backend/usuarios/app:/app/app
      - ./src/backend/common:/common

  busquedas:
    build:
      context: ./src/backend
      dockerfile: busquedas/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8003:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SERVICE_NAME: busquedas
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/backend/busquedas/app:/app/app
      - ./src/backend/common:/common

  hoteles:
    build:
      context: ./src/backend
      dockerfile: hoteles/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8004:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SERVICE_NAME: hoteles
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/backend/hoteles/app:/app/app
      - ./src/backend/common:/common

  reservas:
    build:
      context: ./src/backend
      dockerfile: reservas/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8006:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SERVICE_NAME: reservas
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      SQS_ENDPOINT: ${SQS_ENDPOINT}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    volumes:
      - ./src/backend/reservas/app:/app/app
      - ./src/backend/common:/common

  pagos:
    build:
      context: ./src/backend
      dockerfile: pagos/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8008:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SERVICE_NAME: pagos
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      PAGO_RSA_PRIVATE_KEY_PEM: ${PAGO_RSA_PRIVATE_KEY_PEM:-}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/backend/pagos/app:/app/app
      - ./src/backend/common:/common

  notificaciones:
    build:
      context: ./src/backend
      dockerfile: notificaciones/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8007:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SERVICE_NAME: notificaciones
      SQS_ENDPOINT: ${SQS_ENDPOINT}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      localstack:
        condition: service_started
    volumes:
      - ./src/backend/notificaciones/app:/app/app
      - ./src/backend/common:/common

volumes:
  postgres_data:
  localstack_data: