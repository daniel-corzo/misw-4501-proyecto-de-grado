resolver 127.0.0.11 valid=30s;

# auth no tiene su propio contenedor: sus rutas van al servicio usuarios
map $svc $backend_host {
    auth     usuarios;
    default  $svc;
}

server {
    listen 8080;

    location = /docs {
        alias /usr/share/nginx/html/swagger.html;
        default_type text/html;
    }

    # openapi.json
    location ~ ^/api/(?<svc>[^/]+)/openapi\.json$ {
        proxy_pass         http://$backend_host:8000/openapi.json$is_args$args;
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    # Ruta base
    location ~ ^/api/(?<svc>[^/]+)$ {
        proxy_pass         http://$backend_host:8000/$svc$is_args$args;
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    # Resto de rutas
    location ~ ^/api/(?<svc>[^/]+)/(?<rest>.*)$ {
        proxy_pass         http://$backend_host:8000/$svc/$rest$is_args$args;
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }
}
