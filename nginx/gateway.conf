upstream usuarios       { server usuarios:8000; }
upstream busqueda       { server busqueda:8000; }
upstream hoteles        { server hoteles:8000; }
upstream inventario     { server inventario:8000; }
upstream reservas       { server reservas:8000; }
upstream pagos          { server pagos:8000; }
upstream notificaciones { server notificaciones:8000; }

server {
    listen 8080;

    # Stripea solo /api/ y pasa el resto tal cual al servicio.
    # Ejemplo: /api/auth/login    → auth:8000/auth/login
    #          /api/hoteles/health → hoteles:8000/hoteles/health

    location = /docs {
        alias /usr/share/nginx/html/swagger.html;
        default_type text/html;
    }

    # Auth routes (login, logout, refresh) are served by the usuarios app under /auth/.
    location = /api/auth/openapi.json {
        proxy_pass         http://usuarios/openapi.json;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/auth/ {
        proxy_pass         http://usuarios/auth/;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/usuarios/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://usuarios;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/busqueda/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://busqueda;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/hoteles/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://hoteles;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/inventario/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://inventario;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/reservas/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://reservas;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/pagos/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://pagos;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    location /api/notificaciones/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://notificaciones;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }
}
