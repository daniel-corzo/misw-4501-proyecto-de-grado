resolver 127.0.0.11 valid=30s;

# auth no tiene su propio contenedor: sus rutas van al servicio usuarios
map $svc $backend_host {
    auth     usuarios;
    default  $svc;
}

server {
    listen 8080;

    location = /docs {
        alias /usr/share/nginx/html/swagger.html;
        default_type text/html;
    }

    # openapi.json: FastAPI lo sirve en la raíz del servicio (sin prefijo)
    location ~ ^/api/(?<svc>[^/]+)/openapi\.json$ {
        proxy_pass         http://$backend_host:8000/openapi.json;
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    # Ruta base del servicio sin slash final para evitar redirecciones de FastAPI
    # /api/hoteles          → hoteles:8000/hoteles
    location ~ ^/api/(?<svc>[^/]+)$ {
        proxy_pass         http://$backend_host:8000/$svc;
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }

    # Resto de rutas: stripea /api/ y conserva el prefijo del servicio
    # /api/auth/login        → usuarios:8000/auth/login
    # /api/usuarios/1        → usuarios:8000/usuarios/1
    # /api/hoteles/health    → hoteles:8000/hoteles/health
    location ~ ^/api/(?<svc>[^/]+)/(?<rest>.*)$ {
        proxy_pass         http://$backend_host:8000/$svc/$rest;
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Correlation-ID $request_id;
    }
}
