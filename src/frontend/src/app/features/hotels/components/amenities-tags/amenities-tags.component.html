<div class="amenities-container" [class.editable]="editable" [class.has-error]="error">
  @if (editable) {
    <div class="tags-grid">
      @for (item of availableAmenities; track item.value) {
        <button 
          type="button"
          class="tag-button"
          [class.selected]="isSelected(item.value)"
          [attr.aria-pressed]="isSelected(item.value)"
          [disabled]="disabled"
          (click)="toggleAmenity(item.value)">
          {{ 'amenities.' + item.value | transloco }}
        </button>
      }
    </div>
    @if (error) {
      <span class="field-error">{{ error }}</span>
    }
  } @else {
    <div class="tags-list">
      @for (item of availableAmenities; track item.value) {
        @if (isSelected(item.value)) {
          <span class="tag-badge">{{ 'amenities.' + item.value | transloco }}</span>
        }
      }
    </div>
  }
</div>
