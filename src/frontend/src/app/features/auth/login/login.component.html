<h1 class="auth-title">Iniciar sesión</h1>
<p class="auth-subtitle">Ingresa tus datos para continuar</p>

<form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <div class="auth-field">
    <label for="email">Correo electrónico</label>
    <div class="input-wrapper">
      <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="your.email&#64;example.com"
        autocomplete="email"
      />
    </div>
  </div>

  <div class="auth-field">
    <label for="password">Contraseña</label>
    <div class="input-wrapper">
      <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input
        id="password"
        [type]="showPassword ? 'text' : 'password'"
        formControlName="password"
        placeholder="••••••••"
        autocomplete="current-password"
      />
      <button
        type="button"
        class="input-toggle"
        (click)="showPassword = !showPassword"
        [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
      >
        @if (showPassword) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        }
      </button>
    </div>
  </div>

  <button type="submit" class="auth-btn" [disabled]="loginForm.invalid || loading">
    @if (loading) {
      <span>Ingresando...</span>
    } @else {
      <span>Ingresar</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
    }
  </button>
</form>

<div class="auth-divider"></div>

<p class="auth-footer">
  ¿No tienes una cuenta?
  <button type="button" class="link-btn" (click)="auth.closeLoginModal(); auth.openRegisterModal()">Créala aquí</button>
</p>
