<h1 class="auth-title">Iniciar sesión</h1>
<p class="auth-subtitle">Bienvenido de nuevo a TravelHub</p>

<form class="auth-form">
  <div class="auth-field">
    <label for="email">Correo electrónico</label>
    <input id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email" />
  </div>

  <div class="auth-field">
    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button type="submit" class="auth-btn">Ingresar</button>
</form>

<p class="auth-footer">
  ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a>
</p>
