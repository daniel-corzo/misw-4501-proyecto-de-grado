<div class="reg-header">
  <h1 class="reg-title">Crear cuenta</h1>
  <p class="reg-subtitle">Únete a nuestra red de alojamientos premium</p>
</div>

<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

  <!-- Section 1: Account Credentials -->
  <div class="reg-section">
    <div class="reg-section-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>1. Credenciales de acceso</span>
    </div>

    <div class="reg-row">
      <div class="reg-field">
        <label for="email">Correo electrónico <span class="req">*</span></label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="admin&#64;hotelname.com"
            autocomplete="email"
            [class.input--error]="emailError"
          />
        </div>
        @if (emailError) {
          <span class="field-error">{{ emailError }}</span>
        }
      </div>

      <div class="reg-field">
        <label for="password">Contraseña <span class="req">*</span></label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="new-password"
            [class.input--error]="passwordError"
          />
          <button type="button" class="input-toggle" (click)="showPassword = !showPassword"
                  [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                  [attr.aria-pressed]="showPassword">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        @if (passwordError) {
          <span class="field-error">{{ passwordError }}</span>
        }
      </div>
    </div>
  </div>

  <!-- Section 2: Basic Information -->
  <div class="reg-section">
    <div class="reg-section-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span>2. Información básica</span>
    </div>

    <div class="reg-row">
      <div class="reg-field">
        <label for="nombre">Nombre completo</label>
        <input
          id="nombre"
          type="text"
          formControlName="nombre"
          placeholder="ej. Pedrito Pérez"
          autocomplete="name"
          [class.input--error]="nombreError"
        />
        @if (nombreError) {
          <span class="field-error">{{ nombreError }}</span>
        }
      </div>

      <div class="reg-field">
        <label for="telefono">Teléfono <span class="req">*</span></label>
        <input
          id="telefono"
          type="tel"
          formControlName="telefono"
          placeholder="ej. 3012354341"
          autocomplete="tel"
          [class.input--error]="telefonoError"
        />
        @if (telefonoError) {
          <span class="field-error">{{ telefonoError }}</span>
        }
      </div>
    </div>
  </div>

  <!-- Footer: consent + actions -->
  <div class="reg-footer">
    <label class="consent-label" [class.consent-label--error]="registerForm.get('consent')?.invalid && registerForm.get('consent')?.touched">
      <input type="checkbox" formControlName="consent" />
      <span>Acepto los <a href="/terms" target="_blank" class="terms-link" (click)="$event.stopPropagation()">Términos de Servicio</a> de TravelHub</span>
    </label>

    <div class="reg-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creando...' : 'Crear cuenta' }}
      </button>
    </div>
  </div>

</form>

<div class="auth-divider"></div>
<p class="auth-footer">
  ¿Ya tienes una cuenta?
  <button type="button" class="link-btn" (click)="auth.closeRegisterModal(); auth.openLoginModal()">Inicia sesión</button>
</p>
