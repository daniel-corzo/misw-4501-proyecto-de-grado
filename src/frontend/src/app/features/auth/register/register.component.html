<h1 class="auth-title">Crear cuenta</h1>
<p class="auth-subtitle">Únete a TravelHub y comienza a reservar</p>

<form class="auth-form">
  <div class="auth-field">
    <label for="name">Nombre completo</label>
    <input id="name" type="text" placeholder="Juan Pérez" autocomplete="name" />
  </div>

  <div class="auth-field">
    <label for="email">Correo electrónico</label>
    <input id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email" />
  </div>

  <div class="auth-field">
    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" />
  </div>

  <button type="submit" class="auth-btn">Crear cuenta</button>
</form>

<p class="auth-footer">
  ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
</p>
