<app-modal [title]="modalTitle" [wide]="true" (closed)="closeModal.emit()">
    <form class="room-form" [formGroup]="roomForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
            <div class="form-group">
                <label>{{ 'partner.roomForm.number' | transloco }}</label>
                <input type="text" formControlName="numero" [placeholder]="'partner.roomForm.numberPlaceholder' | transloco" [class.input--error]="numeroError">
                @if (numeroError) {
                <span class="field-error">{{ numeroError }}</span>
                }
            </div>
            <div class="form-group">
                <label>{{ 'partner.roomForm.capacity' | transloco }}</label>
                <input type="number" formControlName="capacidad" [placeholder]="'partner.roomForm.capacityPlaceholder' | transloco" [class.input--error]="capacidadError">
                @if (capacidadError) {
                <span class="field-error">{{ capacidadError }}</span>
                }
            </div>
        </div>

        <div class="form-group">
            <label>{{ 'partner.roomForm.description' | transloco }}</label>
            <textarea
                formControlName="descripcion"
                [placeholder]="'partner.roomForm.descriptionPlaceholder' | transloco"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>{{ 'partner.roomForm.taxes' | transloco }}</label>
                <input type="number" formControlName="impuestos" [placeholder]="'partner.roomForm.taxesPlaceholder' | transloco" [class.input--error]="impuestosError">
                @if (impuestosError) {
                <span class="field-error">{{ impuestosError }}</span>
                }
            </div>
            <div class="form-group">
                <label>{{ 'partner.roomForm.price' | transloco }}</label>
                <input type="number" formControlName="precio" [placeholder]="'partner.roomForm.pricePlaceholder' | transloco" [class.input--error]="precioError">
                @if (precioError) {
                <span class="field-error">{{ precioError }}</span>
                }
            </div>
        </div>

        <div class="form-group" formArrayName="imagenes">
            <label>{{ 'partner.roomForm.images' | transloco }}</label>
            <div class="image-urls-container">
                @for (imgCtrl of imagenesControls; track $index) {
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <input type="url" [formControlName]="$index" [placeholder]="'partner.roomForm.imagePlaceholder' | transloco" autocomplete="off"
                        (input)="onImageInput($index)" [class.input--error]="imgCtrl.invalid && imgCtrl.touched" />
                </div>
                }
            </div>
            @if (imagenesError) {
            <span class="field-error">{{ imagenesError }}</span>
            }
        </div>

        <div class="form-actions">
            @if (isEditMode) {
            <button type="button" class="btn-delete" [disabled]="loading">{{ 'partner.roomForm.delete' | transloco }}</button>
            }
            <div class="form-actions__primary">
                <button type="button" class="btn-cancel" (click)="closeModal.emit()" [disabled]="loading">{{ 'partner.roomForm.cancel' | transloco }}</button>
                <button type="submit" class="btn-save" [disabled]="loading">
                   {{ submitLabel }}
                </button>
            </div>
        </div>
    </form>
</app-modal>
