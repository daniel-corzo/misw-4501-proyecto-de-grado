<app-modal title="Agrega un hospedaje" [wide]="true" (closed)="closeModal.emit()">
    <form class="room-form" [formGroup]="roomForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
            <div class="form-group">
                <label>Número</label>
                <input type="text" formControlName="numero" placeholder="e.g. 1027" [class.input--error]="numeroError">
                @if (numeroError) {
                <span class="field-error">{{ numeroError }}</span>
                }
            </div>
            <div class="form-group">
                <label>Capacidad</label>
                <input type="number" formControlName="capacidad" placeholder="e.g. 2" [class.input--error]="capacidadError">
                @if (capacidadError) {
                <span class="field-error">{{ capacidadError }}</span>
                }
            </div>
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea
                formControlName="descripcion"
                placeholder="Escribe una descripción detallada de las comodidades y características de la habitación..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Impuestos</label>
                <input type="number" formControlName="impuestos" placeholder="e.g. 10000" [class.input--error]="impuestosError">
                @if (impuestosError) {
                <span class="field-error">{{ impuestosError }}</span>
                }
            </div>
            <div class="form-group">
                <label>Precio</label>
                <input type="number" formControlName="precio" placeholder="e.g. 1150000" [class.input--error]="precioError">
                @if (precioError) {
                <span class="field-error">{{ precioError }}</span>
                }
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Fecha de inicio del precio</label>
                <input type="date" formControlName="fechaInicio">
            </div>
            <div class="form-group">
                <label>Fecha de fin del precio</label>
                <input type="date" formControlName="fechaFin">
            </div>
        </div>

        <div class="form-group" formArrayName="imagenes">
            <label>Imágenes (URLs)</label>
            <div class="image-urls-container">
                @for (imgCtrl of imagenesControls; track $index) {
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <input type="url" [formControlName]="$index" placeholder="ej. https://ejemplo.com/imagen.jpg" autocomplete="off"
                        (input)="onImageInput($index)" [class.input--error]="imgCtrl.invalid && imgCtrl.touched" />
                </div>
                }
            </div>
            @if (imagenesError) {
            <span class="field-error">{{ imagenesError }}</span>
            }
        </div>

        <div class="form-actions">
            <button type="button" class="btn-cancel" (click)="closeModal.emit()" [disabled]="loading">Cancelar</button>
            <button type="submit" class="btn-save" [disabled]="loading">
               {{ loading ? 'Guardando...' : 'Guardar hospedaje' }}
            </button>
        </div>
    </form>
</app-modal>
