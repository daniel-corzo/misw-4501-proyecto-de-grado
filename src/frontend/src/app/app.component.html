<router-outlet />
<app-toast />

@if (auth.showLoginModal()) {
  <div class="modal-overlay">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <button class="modal-close" type="button" (click)="auth.closeLoginModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <app-login />
      </div>
    </div>
  </div>
}

@if (auth.showRegisterModal()) {
  <div class="modal-overlay">
    <div class="modal-card modal-card--wide" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <button class="modal-close" type="button" (click)="auth.closeRegisterModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <app-register />
      </div>
    </div>
  </div>
}
