<footer class="footer">
  <div class="footer__inner">

    <!-- Brand -->
    <div class="footer__brand">
      <a class="footer__logo" routerLink="/">
        <img src="/logo.svg" alt="" aria-hidden="true" />
        <span>TravelHub</span>
      </a>
      <p class="footer__tagline">{{ 'footer.tagline' | transloco }}</p>
    </div>

    <!-- Support -->
    <div class="footer__col">
      <h3 class="footer__col-title">{{ 'footer.support' | transloco }}</h3>
      <ul class="footer__links">
        <li><a routerLink="/bookings">{{ 'footer.myBookings' | transloco }}</a></li>
        <li><a routerLink="/terms">{{ 'footer.terms' | transloco }}</a></li>
      </ul>
    </div>

  </div>

  <div class="footer__bottom">
    <div class="footer__bottom-inner">
      <span>{{ 'footer.copyright' | transloco: { year: year } }}</span>
    </div>
  </div>
</footer>
