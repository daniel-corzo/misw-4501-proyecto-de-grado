<footer class="footer">
  <div class="footer__inner">

    <!-- Brand -->
    <div class="footer__brand">
      <a class="footer__logo" routerLink="/">
        <img src="/logo.svg" alt="" aria-hidden="true" />
        <span>TravelHub</span>
      </a>
      <p class="footer__tagline">Enjoy our hotels</p>
    </div>

    <!-- Explore -->
    <div class="footer__col">
      <h3 class="footer__col-title">Explore</h3>
      <ul class="footer__links">
        <li><a routerLink="/hotels">Hotels</a></li>
      </ul>
    </div>

    <!-- Support -->
    <div class="footer__col">
      <h3 class="footer__col-title">Support</h3>
      <ul class="footer__links">
        <li><a routerLink="/help">Help Center</a></li>
        <li><a routerLink="/bookings">My Bookings</a></li>
        <li><a routerLink="/cancellation">Cancellation Options</a></li>
        <li><a routerLink="/terms">Terms of Service</a></li>
      </ul>
    </div>

  </div>

  <div class="footer__bottom">
    <div class="footer__bottom-inner">
      <span>© {{ year }} TravelHub. All rights reserved.</span>
      <div class="footer__bottom-links">
        <a routerLink="/privacy">Privacy Policy</a>
        <a routerLink="/cookies">Cookie Settings</a>
      </div>
    </div>
  </div>
</footer>
