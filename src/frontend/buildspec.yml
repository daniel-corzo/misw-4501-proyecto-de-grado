version: 0.2

# CodeBuild compila Angular y produce el artefacto listo para subir a S3.
# El deploy a S3 y la invalidación de CloudFront los gestiona CodePipeline
# en stages separados (Deploy y Invalidate).

phases:
  install:
    runtime-versions:
      nodejs: 20

  pre_build:
    commands:
      - echo Instalando dependencias...
      - cd src/frontend && npm ci

  build:
    commands:
      - echo Compilando Angular...
      - npm run build -- --configuration production

artifacts:
  # Empaqueta solo los archivos compilados del browser para que CodePipeline
  # los suba directamente a la raíz del bucket S3.
  base-directory: src/frontend/dist/travelhub-web/browser
  files:
    - "**/*"
