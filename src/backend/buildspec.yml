version: 0.2

# Buildspec para UN microservicio. La variable SERVICE la inyecta
# el modulo codebuild de Terraform para cada pipeline individual.
# Ejemplo: SERVICE=hoteles → construye y sube travelhub-hoteles a ECR.

phases:
  pre_build:
    commands:
      - echo "Autenticando en ECR para el servicio $SERVICE..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - REPOSITORY_URI=$ECR_REGISTRY/travelhub-$SERVICE
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo "Construyendo imagen Docker de $SERVICE..."
      - |
        docker build \
          --file src/backend/$SERVICE/Dockerfile \
          --tag  $REPOSITORY_URI:$IMAGE_TAG \
          --tag  $REPOSITORY_URI:latest \
          src/backend

  post_build:
    commands:
      - echo "Subiendo imagen a ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "Generando artefactos para CodeDeploy..."
      - |
        # Obtener la task definition actual para usarla como base (reemplazando la imagen)
        TASK_DEFINITION_NAME="travelhub-$SERVICE-task"
        aws ecs describe-task-definition --task-definition $TASK_DEFINITION_NAME --region $AWS_REGION --query 'taskDefinition' > taskdef_full.json
        # Limpiar la task definition para que sea válida para registro (quitar campos de solo lectura)
        jq '.containerDefinitions[0].image = "'$REPOSITORY_URI':'$IMAGE_TAG'" | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' taskdef_full.json > taskdef.json
      - |
        # Generar appspec.yaml
        # Nota: El contenedor se llama "travelhub-$SERVICE" (ver modulo ecs en terraform)
        cat <<EOF > appspec.yaml
        version: 0.0
        Resources:
          - TargetService:
              Type: AWS::ECS::Service
              Properties:
                TaskDefinition: <TASK_DEFINITION>
                LoadBalancerInfo:
                  ContainerName: "travelhub-$SERVICE"
                  ContainerPort: 8000
        EOF
      - echo "Desplegando mediante CodeDeploy gestionado por CodePipeline..."

artifacts:
  files:
    - taskdef.json
    - appspec.yaml
