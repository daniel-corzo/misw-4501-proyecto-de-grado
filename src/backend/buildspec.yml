version: 0.2

# Buildspec para UN microservicio. La variable SERVICE la inyecta
# el modulo codebuild de Terraform para cada pipeline individual.
# Ejemplo: SERVICE=hoteles → construye y sube travelhub-hoteles a ECR.

phases:
  pre_build:
    commands:
      - echo "Autenticando en ECR para el servicio $SERVICE..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - REPOSITORY_URI=$ECR_REGISTRY/travelhub-$SERVICE
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo "Construyendo imagen Docker de $SERVICE..."
      - |
        docker build \
          --file src/backend/$SERVICE/Dockerfile \
          --tag  $REPOSITORY_URI:$IMAGE_TAG \
          --tag  $REPOSITORY_URI:latest \
          src/backend

  post_build:
    commands:
      - echo "Subiendo imagen a ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "Desplegando en ECS..."
      - aws ecs update-service --cluster travelhub-cluster --service travelhub-$SERVICE-service --force-new-deployment --region $AWS_REGION
      - echo "Deploy de $SERVICE completado."
