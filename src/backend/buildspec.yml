version: 0.2

# Buildspec para UN microservicio. La variable SERVICE la inyecta
# el modulo codebuild de Terraform para cada pipeline individual.
# Ejemplo: SERVICE=hoteles → construye y sube travelhub-hoteles a ECR.

phases:
  pre_build:
    commands:
      - echo "Autenticando en ECR para el servicio $SERVICE..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - REPOSITORY_URI=$ECR_REGISTRY/travelhub-$SERVICE
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo "Construyendo imagen Docker de $SERVICE..."
      - |
        docker build \
          --file src/backend/$SERVICE/Dockerfile \
          --tag  $REPOSITORY_URI:$IMAGE_TAG \
          --tag  $REPOSITORY_URI:latest \
          src/backend

  post_build:
    commands:
      - echo "Subiendo imagen a ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest

      - echo "Generando artefactos para CodeDeploy..."

      # imageDetail.json — URI de la imagen recién construida
      - echo "{\"ImageURI\":\"${REPOSITORY_URI}:${IMAGE_TAG}\"}" > imageDetail.json

      # taskdef.json — task definition vigente con placeholder de imagen
      - |
        TASK_DEF_ARN=$(aws ecs describe-services \
          --cluster travelhub-cluster \
          --services travelhub-$SERVICE-service \
          --region $AWS_REGION \
          --query 'services[0].taskDefinition' \
          --output text)
      - |
        aws ecs describe-task-definition \
          --task-definition $TASK_DEF_ARN \
          --query 'taskDefinition' \
          --output json | python3 -c "
        import json, sys
        td = json.load(sys.stdin)
        for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy']:
            td.pop(key, None)
        td['containerDefinitions'][0]['image'] = '<IMAGE1_NAME>'
        print(json.dumps(td, indent=2))
        " > taskdef.json

      # appspec.yaml — instrucciones de deployment para CodeDeploy
      - |
        cat > appspec.yaml << EOF
        version: 0.0
        Resources:
          - TargetService:
              Type: AWS::ECS::Service
              Properties:
                TaskDefinition: <TASK_DEFINITION>
                LoadBalancerInfo:
                  ContainerName: "travelhub-${SERVICE}"
                  ContainerPort: 8000
                PlatformVersion: "LATEST"
        EOF

      - echo "Artefactos generados correctamente para $SERVICE."

artifacts:
  files:
    - imageDetail.json
    - taskdef.json
    - appspec.yaml
