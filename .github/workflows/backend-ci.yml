name: Backend testing and coverage

on:
  push:
    branches: [develop]
    paths:
      - 'src/backend/**'
  pull_request:
    branches: [develop]
    paths:
      - 'src/backend/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.build-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - 'src/backend/common/**'
            usuarios:
              - 'src/backend/usuarios/**'
            busquedas:
              - 'src/backend/busquedas/**'
            hoteles:
              - 'src/backend/hoteles/**'
            reservas:
              - 'src/backend/reservas/**'
            notificaciones:
              - 'src/backend/notificaciones/**'
            pagos:
              - 'src/backend/pagos/**'

      - name: Build service matrix
        id: build-matrix
        run: |
          ALL_SERVICES=(usuarios busquedas hoteles reservas notificaciones pagos)

          if [ "${{ steps.filter.outputs.common }}" == "true" ]; then
            SERVICES=("common" "${ALL_SERVICES[@]}")
          else
            SERVICES=()
            [ "${{ steps.filter.outputs.usuarios }}" == "true" ] && SERVICES+=(usuarios)
            [ "${{ steps.filter.outputs.busquedas }}" == "true" ] && SERVICES+=(busquedas)
            [ "${{ steps.filter.outputs.hoteles }}" == "true" ] && SERVICES+=(hoteles)
            [ "${{ steps.filter.outputs.reservas }}" == "true" ] && SERVICES+=(reservas)
            [ "${{ steps.filter.outputs.notificaciones }}" == "true" ] && SERVICES+=(notificaciones)
            [ "${{ steps.filter.outputs.pagos }}" == "true" ] && SERVICES+=(pagos)
          fi

          if [ "${#SERVICES[@]}" -eq 0 ]; then
            JSON='[]'
          else
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -sc .)
          fi
          echo "services=$JSON" >> "$GITHUB_OUTPUT"
          echo "Matrix: $JSON"

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install common library
        run: pip install -e ./common

      - name: Install service dependencies
        run: pip install -r ./${{ matrix.service }}/requirements-dev.txt

      - name: Run tests with coverage
        working-directory: src/backend/${{ matrix.service }}
        run: |
          COV_SRC=$([[ "${{ matrix.service }}" == "common" ]] && echo "travelhub_common" || echo "app")
          pytest \
            --cov=$COV_SRC \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: src/backend/${{ matrix.service }}/coverage.xml
          retention-days: 30
