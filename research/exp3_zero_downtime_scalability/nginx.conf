events {
    worker_connections 4096;
}

http {
    # DNS interno de Docker, reevaluando cada segundo
    resolver 127.0.0.11 valid=1s;

    server {
        listen 80;

        location / {
            # El uso de variable fuerza la resolución dinámica
            set $backend "http://api:8000";
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}