version: '3.8'

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    # Instalamos dependencias y levantamos el server al vuelo
    command: /bin/sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api